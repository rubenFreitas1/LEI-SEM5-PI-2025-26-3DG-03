<c-sidebar
  #sidebar1="cSidebar"
  class="d-print-none sidebar sidebar-fixed border-end d-flex flex-column min-vh-100"
  colorScheme="dark"
  id="sidebar1"
  visible
>
  <c-sidebar-header class="border-bottom">
  <c-sidebar-brand [routerLink]="[]">
    <img class="sidebar-brand-full" src="assets/brand/logo-full-white.png" height="81" width="150" alt="Port Management" />
    <img class="sidebar-brand-narrow" height="81" width="70" src="assets/brand/logo.png" alt="PM"/>
  </c-sidebar-brand>
</c-sidebar-header>

<ng-scrollbar pointerEventsMethod="scrollbar" visibility="hover" class="flex-grow-1">
  <c-sidebar-nav [navItems]="filteredNav" dropdownMode="close" compact />
</ng-scrollbar>

  @if (!sidebar1.narrow) {
    <c-sidebar-footer cSidebarToggle="sidebar1" class="border-top d-none d-lg-flex mt-auto" toggle="unfoldable" style="cursor: pointer;">
      <button cSidebarToggler aria-label="Toggle sidebar fold"></button>
    </c-sidebar-footer>
  }
</c-sidebar>

<div class="wrapper d-flex flex-column min-vh-100">
  <app-default-header
    [cShadowOnScroll]="'sm'"
    class="mb-4 d-print-none header header-sticky p-0 shadow-sm"
    position="sticky"
    sidebarId="sidebar1"
  />
  <div class="body flex-grow-1">
    <c-container breakpoint="lg" class="h-auto px-4">
      <router-outlet />
    </c-container>
  </div>
  <app-default-footer />
</div>

<!-- Privacy Policy Modal -->
<app-privacy-policy-modal
  [visible]="showPrivacyModal"
  [policy]="privacyPolicy"
  (accept)="onAcceptPrivacyPolicy()"
  (visibleChange)="showPrivacyModal = $event">
</app-privacy-policy-modal>
